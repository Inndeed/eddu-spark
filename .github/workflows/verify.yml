name: Eddu Quiz Verify

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_public_smoke:
        description: Run the public Railway smoke check
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  code-gate:
    name: Audit, build, and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Product surface audit
        run: npm run audit:product

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  public-smoke:
    name: Public smoke
    if: github.event_name == 'workflow_dispatch' && inputs.run_public_smoke == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Smoke public deployment
        run: npm run smoke:public
