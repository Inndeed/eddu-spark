name: Eddu Quiz Verify

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_public_smoke:
        description: Run the public Railway smoke check
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_live_smoke:
        description: Run the authenticated host/player live smoke check
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_capacity_check:
        description: Include the optional 100-player room capacity check in live smoke
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      public_base_url:
        description: Optional public base URL override
        required: false
        default: ""
      expected_commit_sha:
        description: Optional deployed commit SHA to verify
        required: false
        default: ""

jobs:
  code-gate:
    name: Audit, build, and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Product surface audit
        run: npm run audit:product

      - name: Typecheck scripts
        run: npm run typecheck:scripts

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  public-smoke:
    name: Public smoke
    if: github.event_name == 'workflow_dispatch' && inputs.run_public_smoke == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Smoke public deployment
        env:
          EXPECTED_COMMIT_SHA: ${{ inputs.expected_commit_sha }}
        run: npm run smoke:public -- "${{ inputs.public_base_url }}"

  live-smoke:
    name: Authenticated live smoke
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_smoke == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check live smoke readiness
        env:
          APP_BASE_URL: ${{ inputs.public_base_url }}
          SMOKE_HOST_EMAIL: ${{ secrets.SMOKE_HOST_EMAIL }}
          SMOKE_HOST_PASSWORD: ${{ secrets.SMOKE_HOST_PASSWORD }}
          SMOKE_QUIZ_SET_ID: ${{ secrets.SMOKE_QUIZ_SET_ID }}
          SMOKE_CAPACITY_CHECK: ${{ inputs.run_capacity_check }}
        run: npm run check:live-smoke -- "${{ inputs.public_base_url }}"

      - name: Smoke host/player live flow
        env:
          APP_BASE_URL: ${{ inputs.public_base_url }}
          SMOKE_HOST_EMAIL: ${{ secrets.SMOKE_HOST_EMAIL }}
          SMOKE_HOST_PASSWORD: ${{ secrets.SMOKE_HOST_PASSWORD }}
          SMOKE_QUIZ_SET_ID: ${{ secrets.SMOKE_QUIZ_SET_ID }}
          SMOKE_CAPACITY_CHECK: ${{ inputs.run_capacity_check }}
        run: npm run smoke:live
